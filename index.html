<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro Programador</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#eaf6ff;
    display:flex;
    height:100vh;
}

/* PANEL IZQUIERDO */
.panel{
    width:35%;
    background:white;
    padding:20px;
    overflow:auto;
    border-right:3px solid #d9eaff;
}

.panel h2{
    color:#0077cc;
    margin-bottom:15px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

input[type="color"]{
    height:45px;
}

/* CENTRO */
.preview{
    width:35%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.contenedor{
    width:100%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#0077cc;
}

img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    margin:15px 0;
}

.servicio{
    background:#dff5e1;
    padding:10px;
    border-radius:10px;
    margin-top:15px;
    font-weight:bold;
}

footer{
    margin-top:20px;
    color:gray;
}

/* DERECHA */
.codigo{
    width:30%;
    background:#1e1e1e;
    color:#00ff88;
    padding:15px;
    overflow:auto;
}

.codigo h2{
    color:white;
    margin-bottom:10px;
}

pre{
    white-space:pre-wrap;
    font-size:14px;
    line-height:1.4;
}
</style>
</head>

<body>

<!-- PANEL -->
<div class="panel">

<h2>🎨 Editor del Alumno</h2>

<label>Nombre:</label>
<input type="text" id="nombre" value="Carlos Noel">

<label>Profesión:</label>
<input type="text" id="profesion" value="Doctor">

<label>Descripción:</label>
<textarea id="descripcion">Cuando sea grande quiero ayudar a las personas.</textarea>

<label>Servicio:</label>
<input type="text" id="servicio" value="🩺 Ofrezco consultas médicas">

<label>Foto Local:</label>
<input type="file" id="fotoLocal" accept="image/*">

<label>Color del BODY:</label>
<input type="color" id="colorBody" value="#eaf6ff">

<label>Color del CONTENEDOR:</label>
<input type="color" id="colorCaja" value="#ffffff">

<label>Color del título:</label>
<input type="color" id="colorTitulo" value="#0077cc">

</div>

<!-- PREVIEW -->
<div class="preview">

<div class="contenedor" id="caja">

<h1 id="titulo">Soy Carlos Noel, futuro Doctor</h1>

<img id="imagen"
src="https://cdn.pixabay.com/photo/2017/08/06/00/24/doctor-2587298_1280.jpg">

<p id="texto">
Cuando sea grande quiero ayudar a las personas.
</p>

<div class="servicio" id="servicioBox">
🩺 Ofrezco consultas médicas
</div>

<footer>✨ Mi sueño del futuro ✨</footer>

</div>

</div>

<!-- CODIGO -->
<div class="codigo">
<h2>💻 Código Preview</h2>
<pre id="codigoHTML"></pre>
</div>

<script>
const nombre = document.getElementById("nombre");
const profesion = document.getElementById("profesion");
const descripcion = document.getElementById("descripcion");
const servicio = document.getElementById("servicio");
const fotoLocal = document.getElementById("fotoLocal");

const colorBody = document.getElementById("colorBody");
const colorCaja = document.getElementById("colorCaja");
const colorTitulo = document.getElementById("colorTitulo");

let imagenActual =
"https://cdn.pixabay.com/photo/2017/08/06/00/24/doctor-2587298_1280.jpg";

/* FOTO LOCAL */
fotoLocal.addEventListener("change", function(){

const archivo = this.files[0];

if(archivo){
    const lector = new FileReader();

    lector.onload = function(e){
        imagenActual = e.target.result;
        document.getElementById("imagen").src = imagenActual;
        actualizar();
    }

    lector.readAsDataURL(archivo);
}

});

function actualizar(){

document.getElementById("titulo").innerText =
"Soy " + nombre.value + ", futuro " + profesion.value;

document.getElementById("texto").innerText =
descripcion.value;

document.getElementById("servicioBox").innerText =
servicio.value;

/* COLORES */
document.body.style.background = colorBody.value;

document.getElementById("caja").style.background =
colorCaja.value;

document.getElementById("titulo").style.color =
colorTitulo.value;

/* CÓDIGO EN VIVO */
document.getElementById("codigoHTML").innerText =

`<body style="background:${colorBody.value};">

<div class="contenedor"
style="background:${colorCaja.value};">

<h1 style="color:${colorTitulo.value};">
Soy ${nombre.value}, futuro ${profesion.value}
</h1>

<img src="foto_local.jpg">

<p>
${descripcion.value}
</p>

<div class="servicio">
${servicio.value}
</div>

<footer>
✨ Mi sueño del futuro ✨
</footer>

</div>

</body>`;

}

document.querySelectorAll("input, textarea").forEach(campo=>{
campo.addEventListener("input", actualizar);
});

actualizar();
</script>

</body>
</html>
